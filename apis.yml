apis:
- aid: macquarie-bank:macquarie-bank-cdr-product-reference-data-api
  name: Macquarie Bank CDR Product Reference Data API
  tags:
  - CDR
  - Open Banking
  - Product Reference Data
  - Banking Products
  - Public
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.macquarie.com.au/digital-banking/open-banking.html
  baseURL: https://api.macquariebank.io/cds-au/v1/banking
  properties:
  - url: https://www.macquarie.com.au/digital-banking/open-banking.html
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_banking-apis_get-products
    type: APIReference
  - url: openapi/macquarie-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated Consumer Data Right Product Reference Data API.
    Get Products (GET /banking/products) and Get Product Detail (GET /banking/products/{productId})
    return Macquarie Bank Limited's publicly offered banking products - transaction
    and savings accounts, residential mortgages, credit and charge cards, term deposits,
    overdrafts, business loans and regulated trust accounts - conforming to the DSB
    Consumer Data Standards. Confirmed live returning HTTP 200 with an x-v response
    header and a data.products array (21 products at time of review).
