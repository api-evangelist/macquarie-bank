    type: APIReference
  - url: openapi/macquarie-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorised CDR sharing of a customer's saved payees per the
    DSB Consumer Data Standards - Get Payees (GET /banking/payees) and Get Payee Detail
    (GET /banking/payees/{payeeId}), covering domestic, international and BILLER payee
    types. NOT publicly callable - requires Accredited Data Recipient status and consumer
    consent under the CDR OAuth2 / OpenID Connect (FAPI) profile over MTLS. The listed
    OpenAPI is the shared DSB standard, not a Macquarie-proprietary contract.
- aid: macquarie-bank:macquarie-connectivity-data-api
  name: Macquarie Connectivity & Data API
  tags:
  - Payments
  - Accounts
  - Business Banking
  - Developer Portal
  - Connectivity
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.macquariebank.io/devportal/
  properties:
  - url: https://developer.macquariebank.io/devportal/
    type: DeveloperPortal
  - url: https://www.macquarie.com.au/help/business/manage-your-accounts/connectivity-services-and-open-banking/macquarie-connectivity-solutions.html
    type: Documentation
  description: Macquarie's connectivity / data APIs for business, documented through
    the registered Macquarie developer portal, let approved businesses and software
    partners automate account information retrieval and payment operations (balances,
    transaction history, payment automation) as an alternative to file-based banking.
    Partner-gated - access, credentials and the OpenAPI/Swagger reference are only
    available after registration and approval through the developer portal (the portal
    is edge-protected and returns HTTP 403 to unauthenticated requests); no public,
    downloadable spec is published, so none is fabricated here.
- aid: macquarie-bank:macquarie-deft-payments-api
  name: Macquarie DEFT Payments API
  tags:
  - Payments
  - Direct Debit
  - Developer Portal
  - Business Banking
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.macquariebank.io/devportal/
  properties:
  - url: https://developer.macquariebank.io/devportal/
    type: DeveloperPortal
  - url: https://www.macquarie.com.au/help/business/deft.html
    type: Documentation
  description: Macquarie's DEFT payments platform, surfaced through the registered
    Macquarie developer portal, lets businesses build branded payment experiences
    with tokenised credit card, bank account and direct debit APIs, payment schedules
    and one-off payments. Documentation and access require registration through the
    developer portal (no unauthenticated public base URL is published).
