    and planned outages of Macquarie Bank's CDR data holder implementation. GET /discovery/status
    confirmed live returning HTTP 200.
- aid: macquarie-bank:macquarie-bank-cdr-accounts-balances-api
  name: Macquarie Bank CDR Accounts & Balances API
  tags:
  - CDR
  - Open Banking
  - Accounts
  - Balances
  - Data Sharing
  - Authorized
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.macquarie.com.au/digital-banking/open-banking.html
  baseURL: https://api.macquariebank.io/cds-au/v1/banking/accounts
  properties:
  - url: https://www.macquarie.com.au/digital-banking/open-banking.html
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_banking-apis_get-accounts
    type: APIReference
  - url: openapi/macquarie-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorised CDR account information sharing per the DSB Consumer
    Data Standards CDR Banking API - Get Accounts (GET /banking/accounts), Get Bulk
    Balances (GET /banking/accounts/balances), Get Account Balance (GET /banking/accounts/{accountId}/balance)
    and Get Account Detail (GET /banking/accounts/{accountId}). NOT publicly callable -
    access requires Accredited Data Recipient (ADR) status and explicit consumer consent,
    secured with the CDR OAuth2 / OpenID Connect (FAPI 1.0 Advanced) security profile
    over MTLS-bound tokens. The listed OpenAPI is the shared DSB standard, not a Macquarie-proprietary
    contract.
- aid: macquarie-bank:macquarie-bank-cdr-transactions-api
  name: Macquarie Bank CDR Transactions API
  tags:
  - CDR
  - Open Banking
  - Transactions
  - Data Sharing
  - Authorized
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.macquarie.com.au/digital-banking/open-banking.html
  baseURL: https://api.macquariebank.io/cds-au/v1/banking
