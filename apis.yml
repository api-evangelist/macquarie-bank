    payments per the DSB Consumer Data Standards - Get Direct Debits For Account, Get
    Bulk Direct Debits, Get Scheduled Payments For Account, Get Scheduled Payments Bulk
    (GET /banking/accounts/{accountId}/direct-debits, /banking/accounts/direct-debits,
    /banking/accounts/{accountId}/payments/scheduled, /banking/payments/scheduled).
    NOT publicly callable - requires ADR accreditation and consumer consent under the
    CDR OAuth2 / OpenID Connect (FAPI) profile over MTLS. The listed OpenAPI is the
    shared DSB standard, not a Macquarie-proprietary contract.
