    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_banking-apis_get-transactions-for-account
    type: APIReference
  - url: openapi/macquarie-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorised CDR transaction data sharing per the DSB Consumer
    Data Standards - Get Transactions For Account (GET /banking/accounts/{accountId}/transactions)
    and Get Transaction Detail (GET /banking/accounts/{accountId}/transactions/{transactionId}),
    supporting date, amount and text filters. NOT publicly callable - requires ADR accreditation
    and consumer consent under the CDR OAuth2 / OpenID Connect (FAPI) profile over MTLS.
    The listed OpenAPI is the shared DSB standard, not a Macquarie-proprietary contract.
