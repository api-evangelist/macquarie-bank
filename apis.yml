    and planned outages of Macquarie Bank's CDR data holder implementation. GET /discovery/status
    confirmed live returning HTTP 200.
- aid: macquarie-bank:macquarie-bank-cdr-banking-data-sharing-api
  name: Macquarie Bank CDR Banking Data Sharing API
  tags:
  - CDR
  - Open Banking
  - Data Sharing
  - Accounts
  - Transactions
  - Authenticated
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.macquarie.com.au/digital-banking/open-banking.html
  baseURL: https://api.macquariebank.io/cds-au/v1/banking
  properties:
  - url: https://www.macquarie.com.au/digital-banking/open-banking.html
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api
    type: APIReference
  - url: openapi/macquarie-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorised CDR banking data sharing (accounts, balances, transactions,
    payees, direct debits, scheduled payments) exposed per the DSB Consumer Data Standards.
    Access requires CDR accreditation as an Accredited Data Recipient and consumer
    consent, secured with the CDR OAuth2 / OpenID Connect (FAPI-based) security profile
    over MTLS - not an openly callable endpoint.
- aid: macquarie-bank:macquarie-deft-payments-api
  name: Macquarie DEFT Payments API
