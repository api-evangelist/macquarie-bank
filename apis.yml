name: Macquarie Bank
kind: company
description: Macquarie Bank Limited is an Australian authorised deposit-taking institution
  (ADI) and the retail and business banking arm of Macquarie Group Limited, the ASX-listed
  (ASX:MQG) global financial services group headquartered in Sydney. It is not a mutual
  or customer-owned bank; it is a wholly-owned, shareholder-owned subsidiary of a publicly
  listed parent. Its digital bank offers transaction and savings accounts, home loans,
  credit and charge cards, term deposits, overdrafts and business lending. As a designated
  data holder under Australia's Consumer Data Right (CDR / Open Banking), Macquarie
  Bank exposes a public, unauthenticated Product Reference Data (PRD) API conforming
  to the Consumer Data Standards (CDS), alongside accredited-data-recipient data sharing
  and a registered developer portal that documents its DEFT payments platform.
